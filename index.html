
<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Intelligence Hub | Universal Knowledge Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              },
              accent: {
                500: '#6366f1',
                600: '#4f46e5',
              }
            },
            borderRadius: { 
              '4xl': '2rem', 
              '5xl': '2.5rem',
              '6xl': '3.5rem'
            },
            animation: {
              'shimmer': 'shimmer 2s linear infinite',
              'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float-slow': 'float 12s ease-in-out infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                '50%': { transform: 'translateY(-20px) rotate(2deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
          --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          background: #f8fafc;
          text-rendering: optimizeLegibility;
          -webkit-font-smoothing: antialiased;
          min-height: 100vh;
          transition: background-color 0.5s ease;
          overflow-x: hidden;
        }

        ::-webkit-scrollbar {
          display: none;
        }

        html, body {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }

        .dark body {
          background: #020617;
        }

        .glass { 
          background: rgba(255, 255, 255, 0.45); 
          backdrop-filter: blur(24px) saturate(180%); 
          border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass { 
          background: rgba(15, 23, 42, 0.45); 
          border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .premium-shadow {
          box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08), 0 0 1px 0 rgba(0, 0, 0, 0.1);
        }

        @keyframes fade-up { 
          from { opacity: 0; transform: translateY(20px); } 
          to { opacity: 1; transform: translateY(0); } 
        }

        .animate-fade-up { 
          animation: fade-up 0.8s var(--transition-smooth) forwards; 
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-katex": "https://esm.sh/react-katex@^3.1.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-slate-900 dark:text-slate-100 antialiased overflow-y-auto">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
